name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate sitemap
        run: npm run sitemap

      - name: Deploy to EdgeOne Pages
        run: |
          npm install -g edgeone
          edgeone pages deploy ./dist -n toolbox -t ${{ secrets.EDGEONE_TOKEN }}
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
